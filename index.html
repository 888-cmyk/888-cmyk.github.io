<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理学院B部 · 学生画像导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 32px; font-weight: 700; background: linear-gradient(115deg, #1e2b4a, #2c3e6e); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .header p { color: #4a627a; }
        .stats { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-around; text-align: center; }
        .stat-item { flex: 1; }
        .stat-number { font-size: 28px; font-weight: 700; color: #1e3b5a; }
        .stat-label { font-size: 14px; color: #5f7a9a; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .filter-btn { background: rgba(255,255,255,0.6); backdrop-filter: blur(4px); border: none; padding: 8px 20px; border-radius: 40px; font-size: 15px; font-weight: 500; color: #1e2b4a; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: #2b5f8a; color: white; }
        .search-box { margin-bottom: 30px; background: white; border-radius: 60px; padding: 8px 20px; display: flex; align-items: center; }
        .search-box i { color: #8aa0bc; margin-right: 12px; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; padding: 12px 0; }
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .student-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); border-radius: 28px; padding: 20px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.7); cursor: pointer; }
        .student-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.9); }
        .card-avatar { width: 50px; height: 50px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; }
        .card-avatar-fallback { width: 50px; height: 50px; background: linear-gradient(135deg, #2b5876, #4e4376); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: white; margin-bottom: 15px; }
        .student-card h3 { font-size: 18px; font-weight: 700; color: #1a2c42; margin-bottom: 8px; }
        .student-card p { font-size: 13px; color: #5f7a9a; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .student-card p i { width: 20px; }
        .major-tag { display: inline-block; background: rgba(43,95,138,0.15); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #2b5f8a; margin-top: 8px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag { background: rgba(67,108,145,0.12); padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 500; color: #2c5a7a; }
        .no-result { text-align: center; padding: 60px; color: #6c86a3; }
        footer { text-align: center; margin-top: 50px; font-size: 13px; color: #8aa0bc; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-building"></i> 管理学院B部 · 学生画像导航</h1>
        <p>点击卡片查看详细画像 | 支持按专业筛选</p >
    </div>
    <div class="stats">
        <div class="stat-item"><div class="stat-number" id="totalCount">0</div><div class="stat-label">总人数</div></div>
        <div class="stat-item"><div class="stat-number" id="visibleCount">0</div><div class="stat-label">当前显示</div></div>
    </div>
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-major="all">全部</button>
        <button class="filter-btn" data-major="工商管理">工商管理</button>
        <button class="filter-btn" data-major="电子商务">电子商务</button>
        <button class="filter-btn" data-major="信息管理与信息系统">信息管理与信息系统</button>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="按姓名、学号、专业或地区搜索...">
    </div>
    <div class="student-grid" id="studentGrid">加载中...</div>
    <footer><i class="fas fa-database"></i> 数据来源：学院档案 | 每学期更新</footer>
</div>
<script>
    let studentsData = [];
    let currentMajor = 'all';

    function escapeText(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadData() {
        try {
            const res = await fetch('students.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            studentsData = data;
            renderStudents();
        } catch (err) {
            document.getElementById('studentGrid').innerHTML = '<div class="no-result">数据加载失败，请检查网络或稍后重试</div>';
            console.error(err);
        }
    }

    function renderStudents() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered = studentsData;
        if (currentMajor !== 'all') filtered = filtered.filter(s => s.major === currentMajor);
        if (searchTerm !== '') filtered = filtered.filter(s => 
            (s.name && s.name.toLowerCase().includes(searchTerm)) ||
            (s.id && s.id.toLowerCase().includes(searchTerm)) ||
            (s.major && s.major.toLowerCase().includes(searchTerm)) ||
            (s.hometown && s.hometown.toLowerCase().includes(searchTerm)) ||
            (s.skills && s.skills.toLowerCase().includes(searchTerm))
        );
        document.getElementById('totalCount').innerText = studentsData.length;
        document.getElementById('visibleCount').innerText = filtered.length;
        const grid = document.getElementById('studentGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-result">😢 没有找到符合条件的同学</div>';
            return;
        }
        let html = '';
        for (let s of filtered) {
            // 只显示兴趣爱好，避免技能重复
            const interestArray = s.interests ? s.interests.split(',').map(t => t.trim()) : [];
            const tagHtml = interestArray.map(tag => `<span class="tag">${escapeText(tag)}</span>`).join('');
            
            // 头像：优先使用 avatarUrl（相对路径），加载失败时回退到字母头像
            let avatarHtml;
            if (s.avatarUrl && s.avatarUrl !== '') {
                avatarHtml = `< img class="card-avatar" src="${s.avatarUrl}" alt="${escapeText(s.name)}" 
                    onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';">` +
                    `<div class="card-avatar-fallback" style="display:none;">${escapeText(s.avatarInitial || s.name.substring(0,2).toUpperCase())}</div>`;
            } else {
                avatarHtml = `<div class="card-avatar-fallback">${escapeText(s.avatarInitial || s.name.substring(0,2).toUpperCase())}</div>`;
            }
            
            html += `<div class="student-card" onclick="location.href='student.html?id=${encodeURIComponent(s.id)}'">
                        ${avatarHtml}
                        <h3>${escapeText(s.name)}</h3>
                        <p><i class="fas fa-id-card"></i> ${escapeText(s.id)}</p >
                        <p><i class="fas fa-map-marker-alt"></i> ${escapeText(s.hometown || '未知')}</p >
                        <div class="major-tag"><i class="fas fa-graduation-cap"></i> ${escapeText(s.major || '专业未填')}</div>
                        <div class="tags">${tagHtml}</div>
                    </div>`;
        }
        grid.innerHTML = html;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMajor = btn.getAttribute('data-major');
            renderStudents();
        });
    });
    document.getElementById('searchInput').addEventListener('input', () => renderStudents());
    loadData();
</script>
</body>
</html>
