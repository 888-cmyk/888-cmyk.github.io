<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>个人画像 · 信管专业</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== 样式（与你之前的个人画像风格一致） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .profile-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 20, 40, 0.25);
            overflow: hidden;
            padding: 24px 20px 30px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
        }
        .avatar-container {
            position: relative;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 500;
            color: white;
            box-shadow: 0 15px 25px -6px rgba(60, 60, 120, 0.4);
            border: 3px solid white;
        }
        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            background: #4cd964;
            border: 2.5px solid white;
            border-radius: 50%;
        }
        .title-section h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(115deg, #1e2b4a, #2c3e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .badge {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #1e2b4a;
            display: inline-block;
        }
        .info-module {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 22px;
        }
        .module-title {
            font-size: 18px;
            font-weight: 650;
            color: #162b40;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 12px;
        }
        .info-item {
            background: white;
            border-radius: 20px;
            padding: 12px 10px;
        }
        .info-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }
        .info-value {
            font-weight: 650;
            font-size: 16px;
            color: #0c1a2b;
        }
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            background: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid #eef3fc;
            color: #1f2f47;
        }
        .promise-item {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
            background: white;
            padding: 14px 16px;
            border-radius: 22px;
            align-items: center;
        }
        .promise-icon {
            width: 42px;
            height: 42px;
            background: #f0f7ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f5090;
            font-size: 18px;
        }
        .promise-text {
            font-weight: 500;
            color: #11212e;
            line-height: 1.4;
        }
        hr {
            margin: 20px 0;
            border: none;
            height: 2px;
            background: linear-gradient(to right, #ffffff, #b3c7e0, #ffffff);
        }
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #6b7a90;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2b5f8a;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileCard">
        <div style="text-align: center; padding: 40px;">加载中...</div>
    </div>

    <script>
        // 获取 URL 中的 id 参数（例如 ?id=202411001）
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">未指定学生ID</div>';
        } else {
            // 加载 students.json 文件
            fetch('students.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('无法加载 students.json');
                    }
                    return response.json();
                })
                .then(data => {
                    // 根据 id 查找学生
                    const student = data.find(s => s.id == studentId);
                    if (!student) {
                        document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">未找到该学生信息</div>';
                        return;
                    }

                    // 处理技能和兴趣（可能是数组或逗号分隔的字符串）
                    const skillArray = Array.isArray(student.skills) ? student.skills : (student.skills ? student.skills.split(',') : []);
                    const interestArray = Array.isArray(student.interests) ? student.interests : (student.interests ? student.interests.split(',') : []);

                    // 构建动态 HTML
                    let html = `
                        <div class="header">
                            <div class="avatar-container">
                                <div class="avatar">${student.avatarInitial || student.name.substring(0,2).toUpperCase()}</div>
                                <span class="status-dot"></span>
                            </div>
                            <div class="title-section">
                                <h1>${student.name} · 个人画像</h1>
                                <span class="badge"><i class="fas fa-graduation-cap"></i> 信管专业</span>
                            </div>
                        </div>
                        
                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-user-circle"></i> 基本信息</div>
                            <div class="info-grid">
                                <div class="info-item"><div class="info-label">学号</div><div class="info-value">${student.id}</div></div>
                                <div class="info-item"><div class="info-label">籍贯</div><div class="info-value">${student.hometown}</div></div>
                                ${student.mbti ? `<div class="info-item"><div class="info-label">MBTI</div><div class="info-value">${student.mbti}</div></div>` : ''}
                            </div>
                        </div>
                        
                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-heart"></i> 性格与兴趣</div>
                            <div class="tag-cloud">
                                ${interestArray.map(i => `<span class="tag">${i.trim()}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-cog"></i> 技能特长</div>
                            <div class="tag-cloud">
                                ${skillArray.map(s => `<span class="tag">${s.trim()}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-chart-line"></i> 在校状况</div>
                            <div class="promise-item">
                                <div class="promise-icon"><i class="fas fa-graduation-cap"></i></div>
                                <div class="promise-text"><strong>📚 学业成绩</strong><br>${student.grades || '暂无'}</div>
                            </div>
                            <div class="promise-item">
                                <div class="promise-icon"><i class="fas fa-calendar-alt"></i></div>
                                <div class="promise-text"><strong>🎉 学校活动</strong><br>${student.activities || '暂无'}</div>
                            </div>
                            <div class="promise-item">
                                <div class="promise-icon"><i class="fas fa-users"></i></div>
                                <div class="promise-text"><strong>🚩 社团动态</strong><br>${student.club || '暂无'}</div>
                            </div>
                        </div>
                        
                        <hr>
                        <div class="footer-note">
                            <i class="fas fa-mobile-alt"></i> 个人画像 · 数据实时更新
                        </div>
                    `;
                    document.getElementById('profileCard').innerHTML = html;
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">数据加载失败，请稍后重试</div>';
                });
        }
    </script>
</body>
</html>
